services:
  # Backend API
  - type: web
    name: bpo-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: true
      - key: DATABASE_NAME
        value: BPO
      - fromGroup: bpo-secrets

  # Frontend Static Site
  - type: web
    name: bpo-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://bpo-mvz9.onrender.com/api
